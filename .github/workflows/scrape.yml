name: Daily Beer Scraper

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node beer-scraper.js --verbose

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/_data/beers.json src/_data/meta.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to beers.json"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "beers.json has changed"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/_data/beers.json src/_data/meta.json
          git commit -m "data: update beers.json"
          git push
